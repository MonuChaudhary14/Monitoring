<!DOCTYPE html>
<html>
<head>
    <title>Observability Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f4f6f9;
        }

        h2 {
            margin-bottom: 10px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .status {
            font-weight: bold;
            font-size: 18px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
        }

        .chart-container {
            margin-bottom: 40px;
        }

        canvas {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        select {
            padding: 6px 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<h2>Infrastructure Monitoring Dashboard</h2>

<div class="top-bar">
    <div>
        <label for="timeRange">Time Range:</label>
        <select id="timeRange">
            <option value="5">Last 5 Minutes</option>
            <option value="15">Last 15 Minutes</option>
            <option value="60">Last 1 Hour</option>
        </select>
    </div>

    <div id="serverStatus" class="status">
        Status: Checking...
    </div>
</div>

<div class="cards">
    <div class="card">
        <h3>Current CPU</h3>
        <p id="currentCPU">--</p>
    </div>
    <div class="card">
        <h3>Average CPU</h3>
        <p id="avgCPU">--</p>
    </div>
    <div class="card">
        <h3>Current Memory</h3>
        <p id="currentMemory">--</p>
    </div>
    <div class="card">
        <h3>Current Disk</h3>
        <p id="currentDisk">--</p>
    </div>
</div>

<div class="chart-container">
    <h3>CPU Usage</h3>
    <canvas id="cpuChart" height="100"></canvas>
</div>

<div class="chart-container">
    <h3>Memory Usage</h3>
    <canvas id="memoryChart" height="100"></canvas>
</div>

<div class="chart-container">
    <h3>Disk Usage</h3>
    <canvas id="diskChart" height="100"></canvas>
</div>

<script>
async function fetchMetrics() {
    const minutes = document.getElementById("timeRange").value;

    const response = await fetch(
        `/api/metrics/?server=1&minutes=${minutes}`
    );

    const data = await response.json();

    const statusElement = document.getElementById("serverStatus");
    statusElement.innerText = "Status: " + data.status.toUpperCase();
    statusElement.style.color =
        data.status === "online" ? "green" : "red";

    const labels = data.metrics.map(m =>
        new Date(m.timestamp).toLocaleTimeString()
    );

    const cpuData = data.metrics.map(m => m.cpu);
    const memoryData = data.metrics.map(m => m.memory);
    const diskData = data.metrics.map(m => m.disk);

    if (data.metrics.length > 0) {
        const latest = data.metrics[data.metrics.length - 1];

        document.getElementById("currentCPU").innerText =
            latest.cpu.toFixed(1) + " %";

        document.getElementById("avgCPU").innerText =
            data.average_cpu ? data.average_cpu.toFixed(1) + " %" : "--";

        document.getElementById("currentMemory").innerText =
            latest.memory.toFixed(1) + " %";

        document.getElementById("currentDisk").innerText =
            latest.disk.toFixed(1) + " %";
    }

    cpuChart.data.labels = labels;
    cpuChart.data.datasets[0].data = cpuData;

    memoryChart.data.labels = labels;
    memoryChart.data.datasets[0].data = memoryData;

    diskChart.data.labels = labels;
    diskChart.data.datasets[0].data = diskData;

    cpuChart.update();
    memoryChart.update();
    diskChart.update();
}

function createChart(ctx, label, color) {
    return new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: label,
                data: [],
                borderColor: color,
                borderWidth: 2,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    min: 0,
                    max: 100
                }
            }
        }
    });
}

const cpuChart = createChart(
    document.getElementById('cpuChart').getContext('2d'),
    'CPU Usage (%)',
    'red'
);

const memoryChart = createChart(
    document.getElementById('memoryChart').getContext('2d'),
    'Memory Usage (%)',
    'blue'
);

const diskChart = createChart(
    document.getElementById('diskChart').getContext('2d'),
    'Disk Usage (%)',
    'green'
);

document.getElementById("timeRange").addEventListener("change", fetchMetrics);

fetchMetrics();
setInterval(fetchMetrics, 5000);
</script>

</body>
</html>
