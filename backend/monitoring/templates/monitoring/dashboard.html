<!DOCTYPE html>
<html>
<head>
    <title>Observability Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f4f6f9;
        }

        h2 {
            margin-bottom: 30px;
        }

        .chart-container {
            margin-bottom: 40px;
        }

        canvas {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<h2>Infrastructure Monitoring Dashboard</h2>

<div class="chart-container">
    <h3>CPU Usage</h3>
    <canvas id="cpuChart" height="100"></canvas>
</div>

<div class="chart-container">
    <h3>Memory Usage</h3>
    <canvas id="memoryChart" height="100"></canvas>
</div>

<div class="chart-container">
    <h3>Disk Usage</h3>
    <canvas id="diskChart" height="100"></canvas>
</div>

<script>
async function fetchMetrics() {
    const response = await fetch('/api/metrics/?server=1&minutes=5');
    const data = await response.json();

    const labels = data.metrics.map(m =>
        new Date(m.timestamp).toLocaleTimeString()
    );

    const cpuData = data.metrics.map(m => m.cpu);
    const memoryData = data.metrics.map(m => m.memory);
    const diskData = data.metrics.map(m => m.disk);

    cpuChart.data.labels = labels;
    cpuChart.data.datasets[0].data = cpuData;

    memoryChart.data.labels = labels;
    memoryChart.data.datasets[0].data = memoryData;

    diskChart.data.labels = labels;
    diskChart.data.datasets[0].data = diskData;

    cpuChart.update();
    memoryChart.update();
    diskChart.update();
}

function createChart(ctx, label, color) {
    return new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: label,
                data: [],
                borderColor: color,
                borderWidth: 2,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    min: 0,
                    max: 100
                }
            }
        }
    });
}

const cpuChart = createChart(
    document.getElementById('cpuChart').getContext('2d'),
    'CPU Usage (%)',
    'red'
);

const memoryChart = createChart(
    document.getElementById('memoryChart').getContext('2d'),
    'Memory Usage (%)',
    'blue'
);

const diskChart = createChart(
    document.getElementById('diskChart').getContext('2d'),
    'Disk Usage (%)',
    'green'
);

fetchMetrics();
setInterval(fetchMetrics, 5000);
</script>

</body>
</html>
